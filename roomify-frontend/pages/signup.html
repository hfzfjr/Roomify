<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roomify – Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="left-text">
      <h1>Selamat<br>Datang!</h1>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- Tab -->
    <div class="tab-group">
      <button class="tab-btn" onclick="window.location.href='../index.html'">Login</button>
      <button class="tab-btn active">Sign up</button>
    </div>

    <!-- Heading -->
    <div class="form-heading">
      <h2>Sign Up</h2>
      <p>Selamat datang!<br>Silakan daftarkan email dan password Anda</p>
    </div>

    <!-- Nama Lengkap -->
    <div class="field" id="field-nama">
      <label for="nama">Nama Lengkap</label>
      <input type="text" id="nama" placeholder="Masukkan nama lengkap Anda" autocomplete="name"/>
      <p class="error-msg">Nama lengkap tidak boleh kosong.</p>
    </div>

    <!-- Email -->
    <div class="field" id="field-email">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="nama@email.com" autocomplete="email"/>
      <p class="error-msg">Masukkan email yang valid.</p>
    </div>

    <!-- Password -->
    <div class="field" id="field-password">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="Min. 8 karakter" autocomplete="new-password"/>
        <button class="toggle-pw" id="togglePw" title="Tampilkan password"></button>
      </div>
      <p class="error-msg">Password minimal 8 karakter.</p>
    </div>

    <!-- Terms -->
    <p class="terms">
      Dengan mendaftar Anda setuju dengan
      <a href="#">Terms of Use</a> dan <a href="#">Privacy Policy</a>
    </p>

    <!-- Submit -->
    <button class="btn-primary" id="signupBtn" onclick="handleSignup()">
      <span class="spinner"></span>
      <span id="btnText">Sign up</span>
    </button>

  </div>

  <script src="../assets/js/auth.utils.js"></script>
  <script src="../assets/js/signup.js"></script>
</body>
</html>
