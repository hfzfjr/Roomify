<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roomify – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:   #00D4FF;
      --violet: #7B2FBE;
      --purple: #5B16D0;
      --white:  #FFFFFF;
      --gray:   #6B7280;
      --light:  #F9FAFB;
      --border: #E5E7EB;
      --text:   #111827;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      width: 48%;
      position: relative;
      background: linear-gradient(135deg, #7B2FBE 0%, #5B16D0 40%, #00D4FF 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 48px;
      overflow: hidden;
    }

    /* Blob shapes */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(0px);
    }
    .blob-1 {
      width: 420px; height: 420px;
      background: rgba(0, 212, 255, 0.55);
      top: -80px; left: 60px;
      border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
      animation: morph 8s ease-in-out infinite;
    }
    .blob-2 {
      width: 380px; height: 380px;
      background: rgba(123, 47, 190, 0.6);
      top: 160px; left: -60px;
      border-radius: 40% 60% 30% 70% / 60% 40% 70% 30%;
      animation: morph 10s ease-in-out infinite reverse;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: rgba(0, 212, 255, 0.4);
      bottom: 80px; right: -40px;
      border-radius: 70% 30% 50% 50% / 40% 60% 40% 60%;
      animation: morph 12s ease-in-out infinite;
    }

    @keyframes morph {
      0%,100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
      33%      { border-radius: 30% 70% 40% 60% / 60% 30% 70% 40%; }
      66%      { border-radius: 50% 50% 30% 70% / 40% 70% 30% 60%; }
    }

    .left-text {
      position: relative;
      z-index: 2;
    }
    .left-text h1 {
      font-size: 52px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -1px;
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      width: 52%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 80px;
      background: var(--white);
      position: relative;
    }

    /* Tab toggle */
    .tab-group {
      display: flex;
      background: var(--light);
      border-radius: 100px;
      padding: 4px;
      width: fit-content;
      margin-bottom: 40px;
      gap: 4px;
    }
    .tab-btn {
      padding: 10px 28px;
      border: none;
      border-radius: 100px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      background: transparent;
      color: var(--gray);
    }
    .tab-btn.active {
      background: var(--cyan);
      color: var(--white);
      box-shadow: 0 4px 14px rgba(0,212,255,0.4);
    }

    /* Heading */
    .form-heading h2 {
      font-size: 38px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    .form-heading p {
      color: var(--gray);
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Form fields */
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      background: var(--light);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 4px rgba(0,212,255,0.12);
      background: var(--white);
    }

    /* Password wrapper */
    .input-wrapper {
      position: relative;
    }
    .input-wrapper input { padding-right: 50px; }
    .toggle-pw {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray);
      font-size: 18px;
      line-height: 1;
    }

    /* Terms */
    .terms {
      font-size: 12.5px;
      color: var(--gray);
      margin-bottom: 28px;
    }
    .terms a { color: var(--purple); font-weight: 600; text-decoration: none; }
    .terms a:hover { text-decoration: underline; }

    /* Login button */
    .btn-login {
      width: 100%;
      padding: 16px;
      background: var(--cyan);
      color: var(--white);
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      box-shadow: 0 8px 24px rgba(0,212,255,0.4);
    }
    .btn-login:hover {
      background: #00bde8;
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,212,255,0.5);
    }
    .btn-login:active { transform: translateY(0); }

    /* Loading spinner (image 2 style) */
    .btn-login.loading {
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-login.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Page load animation */
    .right-panel > * { opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease forwards; }
    .tab-group      { animation-delay: 0.05s; }
    .form-heading   { animation-delay: 0.12s; }
    .field:nth-child(1) { animation-delay: 0.18s; }
    .field:nth-child(2) { animation-delay: 0.24s; }
    .terms          { animation-delay: 0.30s; }
    .btn-login      { animation-delay: 0.36s; }
    @keyframes fadeUp { to { opacity: 1; transform: none; } }

    /* Responsive */
    @media (max-width: 768px) {
      .left-panel { display: none; }
      .right-panel { width: 100%; padding: 40px 28px; }
    }
  </style>
</head>
<body>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="left-text">
      <h1>Selamat<br>Datang!</h1>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- Tab -->
    <div class="tab-group">
      <button class="tab-btn active" id="tab-login">Login</button>
      <button class="tab-btn" id="tab-signup" onclick="window.location.href='signup.html'">Sign up</button>
    </div>

    <!-- Heading -->
    <div class="form-heading">
      <h2>Login</h2>
      <p>Selamat datang kembali!<br>Silakan masukan email dan password Anda</p>
    </div>

    <!-- Email -->
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="nama@email.com" autocomplete="email"/>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePw" title="Tampilkan password">👁</button>
      </div>
    </div>

    <!-- Terms -->
    <p class="terms">
      Dengan masuk Anda setuju dengan
      <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
    </p>

    <!-- Submit -->
    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <span class="spinner"></span>
      <span id="btnText">Login</span>
    </button>

  </div>

  <script>
    // Toggle password visibility
    const eyeOpen  = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#6B7280" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3" stroke="#6B7280" stroke-width="2"/></svg>`;
    const eyeSlash = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#6B7280" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12a18.09 18.09 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23" stroke="#6B7280" stroke-width="2" stroke-linecap="round"/></svg>`;

    const togglePw = document.getElementById('togglePw');
    const pwInput  = document.getElementById('password');
    togglePw.innerHTML = eyeOpen;
    togglePw.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
      togglePw.innerHTML = isHidden ? eyeSlash : eyeOpen;
    });

    // Fake login with loading state
    function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const btnText  = document.getElementById('btnText');

      if (!email || !password) {
        alert('Mohon isi email dan password terlebih dahulu.');
        return;
      }

      btn.classList.add('loading');
      btnText.textContent = 'Memproses...';

      // Simulasi delay login (ganti dengan fetch API nanti)
      setTimeout(() => {
        btn.classList.remove('loading');
        btnText.textContent = 'Login';
        alert('Login berhasil! Selamat datang di Roomify 🏠');
        // window.location.href = 'dashboard.html'; // aktifkan kalau sudah ada halaman dashboard
      }, 2000);
    }
  </script>

</body>
</html>
